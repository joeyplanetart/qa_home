<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI 自动化 — QA Home</title>
  <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/automation.css">
  <link rel="stylesheet" href="assets/vendor/prism/prism-tomorrow.min.css">
  <link rel="stylesheet" href="assets/vendor/prism/prism-line-numbers.min.css">
  <link rel="stylesheet" href="assets/vendor/prism/prism-line-highlight.min.css">
</head>
<body>

<div class="auto-page">
  <header class="auto-topbar">
    <div class="auto-topbar-left">
      <a href="/" class="auto-back">← QA Home</a>
      <img src="assets/images/logo.svg" alt="QA" width="36" height="36" style="border-radius:50%">
      <div>
        <div class="auto-title">🤖 UI 自动化</div>
        <div class="auto-subtitle">Playwright · pytest · 本地执行</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="auto-status-bar">
        <span class="auto-status-dot" id="statusDot"></span>
        <span id="statusText">加载中…</span>
      </div>
      <button class="btn-icon theme-toggle" onclick="toggleTheme()" title="切换主题" id="themeBtn">🌙</button>
    </div>
  </header>

  <div class="auto-banner" id="envBanner" style="display:none;"></div>

  <div class="auto-layout">
    <aside class="auto-sidebar">
      <div class="auto-sidebar-title">测试套件</div>
      <div id="suiteList"></div>

      <div class="auto-config" id="runConfigPanel">
        <button type="button" class="auto-config-toggle" id="configToggle" onclick="toggleRunConfig()">
          <span>⚙️ 运行配置</span>
          <span class="auto-config-chevron" id="configChevron">▼</span>
        </button>
        <div class="auto-config-body" id="configBody">
          <div class="auto-config-row">
            <label class="auto-config-label">浏览器模式</label>
            <div class="auto-config-segmented">
              <label class="auto-config-chip"><input type="radio" name="cfgHeaded" value="0" checked> 无头</label>
              <label class="auto-config-chip"><input type="radio" name="cfgHeaded" value="1"> 有头</label>
            </div>
          </div>
          <div class="auto-config-row">
            <label class="auto-config-label" for="cfgBrowser">浏览器</label>
            <select class="auto-config-select" id="cfgBrowser">
              <option value="chromium">Chromium</option>
              <option value="firefox">Firefox</option>
              <option value="webkit">WebKit (Safari)</option>
            </select>
          </div>
          <div class="auto-config-row">
            <label class="auto-config-label" for="cfgViewportPreset">视口</label>
            <select class="auto-config-select" id="cfgViewportPreset" onchange="applyViewportPreset()">
              <option value="1280x720">Desktop 1280×720</option>
              <option value="1366x768">Laptop 1366×768</option>
              <option value="1920x1080">Full HD 1920×1080</option>
              <option value="375x812">Mobile 375×812</option>
              <option value="custom">自定义</option>
            </select>
          </div>
          <div class="auto-config-row auto-config-inline" id="cfgViewportCustom">
            <label class="auto-config-label">宽高</label>
            <div class="auto-config-dimensions">
              <input type="number" class="auto-config-input" id="cfgViewportWidth" min="320" max="3840" value="1280">
              <span>×</span>
              <input type="number" class="auto-config-input" id="cfgViewportHeight" min="240" max="2160" value="720">
            </div>
          </div>
          <div class="auto-config-row">
            <label class="auto-config-label" for="cfgDevice">设备模拟</label>
            <select class="auto-config-select" id="cfgDevice" onchange="onDeviceChange()">
              <option value="">不模拟（使用视口）</option>
              <option value="iPhone 13">iPhone 13</option>
              <option value="iPhone 13 Pro">iPhone 13 Pro</option>
              <option value="Pixel 5">Pixel 5</option>
              <option value="Galaxy S9+">Galaxy S9+</option>
              <option value="iPad Pro 11">iPad Pro 11</option>
            </select>
          </div>
          <div class="auto-config-row">
            <label class="auto-config-label" for="cfgSlowMo">慢动作 (ms)</label>
            <input type="number" class="auto-config-input auto-config-input-wide" id="cfgSlowMo" min="0" max="5000" step="100" value="0">
          </div>
          <div class="auto-config-row">
            <label class="auto-config-label" for="cfgTimeout">超时 (ms)</label>
            <input type="number" class="auto-config-input auto-config-input-wide" id="cfgTimeout" min="1000" max="120000" step="1000" value="30000">
          </div>
          <div class="auto-config-row">
            <label class="auto-config-label" for="cfgLocale">语言区域</label>
            <select class="auto-config-select" id="cfgLocale">
              <option value="en-US">en-US</option>
              <option value="zh-CN">zh-CN</option>
              <option value="ja-JP">ja-JP</option>
              <option value="de-DE">de-DE</option>
            </select>
          </div>
          <div class="auto-config-row">
            <label class="auto-config-label" for="cfgVideo">录像</label>
            <select class="auto-config-select" id="cfgVideo">
              <option value="off">关闭</option>
              <option value="retain-on-failure">失败时保留</option>
              <option value="on">始终录制</option>
            </select>
          </div>
          <div class="auto-config-row">
            <label class="auto-config-label" for="cfgTracing">Trace</label>
            <select class="auto-config-select" id="cfgTracing">
              <option value="off">关闭</option>
              <option value="retain-on-failure">失败时保留</option>
              <option value="on">始终开启</option>
            </select>
          </div>
          <button type="button" class="auto-config-reset" onclick="resetRunConfig()">恢复默认</button>
        </div>
      </div>

      <button class="auto-run-btn" id="runSelectedBtn" onclick="runSelectedSuite()">▶ 运行选中套件</button>
      <button class="auto-run-btn" style="margin-top:8px;background:var(--bg-tertiary);color:var(--text-secondary);" onclick="runAllSuites()">▶ 运行全部</button>
    </aside>

    <section class="auto-main">
      <div class="auto-tabs">
        <button class="auto-tab" data-panel="cases" onclick="switchPanel('cases')">📝 测试用例</button>
        <button class="auto-tab active" data-panel="results" onclick="switchPanel('results')">📊 执行结果</button>
        <button class="auto-tab" data-panel="history" onclick="switchPanel('history')">📋 历史记录</button>
        <button class="auto-tab" data-panel="log" onclick="switchPanel('log')">📜 错误日志</button>
        <button class="auto-tab" data-panel="report" onclick="switchPanel('report')">📄 测试报告</button>
      </div>

      <div class="auto-panel" id="panel-cases">
        <div class="auto-cases-layout">
          <div class="auto-cases-list" id="casesList">
            <div class="auto-empty"><div class="auto-empty-icon">📝</div>选择左侧套件查看用例</div>
          </div>
          <div class="auto-code-viewer">
            <div class="auto-code-header" id="codeHeader">选择用例查看源码</div>
            <pre class="auto-code-box" id="codeBox" data-start="1"><code id="codeContent" class="language-python line-numbers"></code></pre>
          </div>
        </div>
      </div>

      <div class="auto-panel active" id="panel-results">
        <div class="auto-summary" id="runSummary"></div>
        <div class="auto-run-config-badge" id="runConfigBadge" style="display:none;"></div>
        <div class="auto-result-list" id="resultsList">
          <div class="auto-empty">
            <div class="auto-empty-icon">▶️</div>
            选择套件并点击运行，或从历史记录中选择一次运行
          </div>
        </div>
      </div>

      <div class="auto-panel" id="panel-history">
        <div class="auto-history-list" id="historyList"></div>
      </div>

      <div class="auto-panel" id="panel-log">
        <pre class="auto-log-box" id="logBox">暂无日志</pre>
      </div>

      <div class="auto-panel" id="panel-report">
        <iframe class="auto-report-frame" id="reportFrame" title="测试报告" src="about:blank"></iframe>
      </div>
    </section>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="assets/vendor/prism/prism.min.js"></script>
<script src="assets/vendor/prism/prism-python.min.js"></script>
<script src="assets/vendor/prism/prism-line-numbers.min.js"></script>
<script src="assets/vendor/prism/prism-line-highlight.min.js"></script>
<script src="assets/js/automation.js"></script>
</body>
</html>
